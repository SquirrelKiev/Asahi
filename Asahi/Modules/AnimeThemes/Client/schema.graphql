"Indicates what fields are available at the top level of a query operation."
type Query {
  "Returns a listing of resources that match a given search term."
  search(search: String! first: Int page: Int): Search!
  "Returns the first featured theme where the current date is between start_at and end_at dates."
  currentfeaturedtheme: FeaturedTheme
  "Returns the data of the currently authenticated user."
  me: Me
  "Returns a page resource."
  page(slug: String!): Page
  "Returns a playlist resource."
  playlist(id: String!): Playlist
  "Returns a playlist track resource."
  playlisttrack(id: String! playlist: String!): PlaylistTrack
  "Returns an anime resource."
  anime(slug: String!): Anime
  "Filter anime by its external id on given site."
  findAnimeByExternalSite(site: ResourceSite! id: [Int!] link: String): [Anime!]!
  "Returns a list of years grouped by its seasons."
  animeyears(year: [Int!]): [AnimeYear!]!
  "Returns an artist resource."
  artist(slug: String!): Artist
  "Returns a series resource."
  series(slug: String!): Series
  "Returns a studio resource."
  studio(slug: String!): Studio
  "Returns a video resource."
  video(id: String!): Video
  "Shuffle themes."
  animethemeShuffle(type: [ThemeType!] format: [AnimeFormat!] year_lte: Int year_gte: Int spoiler: Boolean first: Int page: Int): [AnimeTheme!]!
  "Returns a listing of announcement resources given fields."
  announcementPagination(sort: [AnnouncementSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): AnnouncementPaginator!
  "Returns a listing of dump resources given fields."
  dumpPagination(where: QueryDumpPaginationWhereWhereConditions sort: [DumpSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): DumpPaginator!
  "Returns a listing of page resources given fields."
  pagePagination(id: Int name: String name_like: String path_like: String where: QueryPagePaginationWhereWhereConditions sort: [PageSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): PagePaginator!
  "Returns a listing of external profile resources given fields."
  externalprofilePagination(where: QueryExternalprofilePaginationWhereWhereConditions "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): ExternalProfilePaginator!
  "Returns a listing of playlist resources given fields."
  playlistPagination(name: String name_like: String search: String visibility: PlaylistVisibility where: QueryPlaylistPaginationWhereWhereConditions sort: [PlaylistSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): PlaylistPaginator!
  "Returns a listing of playlist track resources given fields."
  playlisttrackPagination(playlist: String! position: Int where: QueryPlaylisttrackPaginationWhereWhereConditions sort: [PlaylistTrackSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): PlaylistTrackPaginator!
  "Returns a listing of anime resources given fields."
  animePagination(id: Int search: String name: String name_like: String mediaFormat: AnimeMediaFormat @deprecated(reason: "Use 'format' instead") mediaFormat_in: [AnimeMediaFormat!] @deprecated(reason: "Use 'format_in' instead") format: AnimeFormat format_in: [AnimeFormat!] season: AnimeSeason season_in: [AnimeSeason!] slug: String year: Int year_lesser: Int year_greater: Int where: QueryAnimePaginationWhereWhereConditions sort: [AnimeSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): AnimePaginator!
  "Returns a listing of artist resources given fields."
  artistPagination(id: Int name: String name_like: String search: String slug: String where: QueryArtistPaginationWhereWhereConditions sort: [ArtistSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): ArtistPaginator!
  "Returns a listing of audio resources given fields."
  audioPagination(id: Int basename: String filename: String mimetype: String path: String path_like: String size_lesser: Int size_greater: Int where: QueryAudioPaginationWhereWhereConditions sort: [AudioSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): AudioPaginator!
  "Returns a listing of images resources given fields."
  imagePagination(id: Int facet: ImageFacet path: String path_like: String where: QueryImagePaginationWhereWhereConditions sort: [ImageSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): ImagePaginator!
  "Returns a listing of series resources given fields."
  seriesPagination(id: Int search: String name: String name_like: String slug: String where: QuerySeriesPaginationWhereWhereConditions sort: [SeriesSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): SeriesPaginator!
  "Returns a listing of song resources given fields."
  songPagination(id: Int title: String titleNative: String where: QuerySongPaginationWhereWhereConditions sort: [SongSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): SongPaginator!
  "Returns a listing of studio resources given fields."
  studioPagination(id: Int search: String name: String name_like: String slug: String where: QueryStudioPaginationWhereWhereConditions sort: [StudioSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): StudioPaginator!
  "Returns a listing of theme group resources given fields."
  themegroupPagination(id: Int name: String slug: String where: QueryThemegroupPaginationWhereWhereConditions sort: [ThemeGroupSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): ThemeGroupPaginator!
  "Returns a listing of video resources given fields."
  videoPagination(id: Int basename: String filename: String lyrics: Boolean mimetype: String nc: Boolean overlap: VideoOverlap path: String path_like: String resolution: Int resolution_lesser: Int resolution_greater: Int size_lesser: Int size_greater: Int source: VideoSource subbed: Boolean uncen: Boolean where: QueryVideoPaginationWhereWhereConditions sort: [VideoSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): VideoPaginator!
  "Returns a listing of anime themes resources given fields."
  animethemePagination(id: Int search: String type: ThemeType type_in: [ThemeType!] sequence: Int sequence_lesser: Int sequence_greater: Int slug: String where: QueryAnimethemePaginationWhereWhereConditions sort: [AnimeThemeSort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): AnimeThemePaginator!
  animethemeentryPagination(episodes: String episodes_like: String nsfw: Boolean spoiler: Boolean version: Int version_lesser: Int version_greater: Int where: QueryAnimethemeentryPaginationWhereWhereConditions sort: [AnimeThemeEntrySort!] "Limits number of fetched items. Maximum allowed value: 100." first: Int! = 15 "The offset from which items are returned." page: Int): AnimeThemeEntryPaginator!
}

type Mutation {
  ToggleLike(entryId: Int playlistId: String): Like
  "Mark a video as watched."
  Watch(entryId: Int! videoId: Int!): WatchHistory
  CreatePlaylist(name: String! visibility: PlaylistVisibility! description: String): Playlist!
  UpdatePlaylist(id: String! name: String visibility: PlaylistVisibility description: String): Playlist!
  DeletePlaylist(id: String!): MessageResponse!
  CreatePlaylistTrack(playlist: String! entryId: Int! videoId: Int! position: Int previous: String @deprecated(reason: "Use position instead") next: String @deprecated(reason: "Use position instead")): PlaylistTrack!
  UpdatePlaylistTrack(id: String! playlist: String! entryId: Int videoId: Int position: Int previous: String @deprecated(reason: "Use position instead") next: String @deprecated(reason: "Use position instead")): PlaylistTrack!
  DeletePlaylistTrack(id: String! playlist: String!): MessageResponse!
}

