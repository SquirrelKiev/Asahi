  likes("Limits number of fetched items." first: Int! = 1000 "The offset from which items are returned." page: Int): [Like!]!
  permissions(default: Boolean priority_lesser: Int priority_greater: Int sort: [PermissionSort!] "Limits number of fetched items." first: Int! = 1000 "A cursor after which elements are returned." after: String): PermissionConnection!
