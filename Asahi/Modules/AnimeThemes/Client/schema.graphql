  "The date the user confirmed their two-factor authentication"
  twoFactorConfirmedAt(format: String! = "Y-m-d H:i:s"): String!
  "The date that the resource was created"
  createdAt(format: String! = "Y-m-d H:i:s"): String!
  "The date that the resource was updated"
  updatedAt(format: String! = "Y-m-d H:i:s"): String!
  playlists(name_like: String visibility: PlaylistVisibility where: MePlaylistsWhereWhereConditions sort: [PlaylistSort!] "Limits number of fetched items." first: Int! = 1000 "The offset from which items are returned." page: Int): [Playlist!]!
